apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phoenix-frontend
  template:
    metadata:
      labels:
        app: phoenix-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/ts-a-devops/taskapp-frontend:v1.0.0
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phoenix-backend
  template:
    metadata:
      labels:
        app: phoenix-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/ts-a-devops/taskapp-backend:v1.0.0
        ports:
        - containerPort: 80
