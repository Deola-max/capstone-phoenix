---
- name: Check if K3s agent is already running
  stat:
    path: /usr/local/bin/k3s
  register: k3s_agent_installed

- name: Join worker nodes to the K3s cluster
  shell: >
    curl -sfL https://get.k3s.io |
    K3S_URL="https://10.0.1.237:6443"
    K3S_TOKEN="{{ hostvars['k3s-master']['k3s_cluster_token'] }}"
    sh -
  when: not k3s_agent_installed.stat.exists
