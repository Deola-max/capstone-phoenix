- name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./taskapp-backend      # This tells Docker: "Look here for your code"
          file: ./manifests/Dockerfile    # This tells Docker where the instructions are
          push: true
          tags: ghcr.io/ts-a-devops/taskapp-backend:v1.0.0
